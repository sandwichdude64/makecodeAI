<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MakeCode AI Webpage</title>
    <style>
        body {
            background: #1e1e1e;
            color: white;
            font-family: Consolas, monospace;
            margin: 0;
            padding: 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        #container {
            display: flex;
            gap: 20px;
        }
        #pixelGrid {
            display: grid;
            width: 304px;
            height: 304px;
            background: #000000;
            border: 4px solid #4c4cff;
            grid-template-columns: repeat(19, 1fr);
            grid-template-rows: repeat(19, 1fr);
            box-sizing: border-box;
        }
        .pixel {
            width: 100%;
            height: 100%;
        }
        #rightPanel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #hfTokenInput {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            background: #2a2a2a;
            color: #ff9d00;
            border: 2px solid #ff9d00;
            box-sizing: border-box;
            font-family: Consolas, monospace;
        }
        #hfTokenInput::placeholder {
            color: #888;
        }
        #output {
            background: #111;
            padding: 10px;
            border: 2px solid #4c4cff;
            height: 160px;
            overflow-y: auto;
            white-space: pre-wrap;
            box-sizing: border-box;
        }
        #userInput {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background: #252525;
            color: white;
            border: 1px solid #555;
            box-sizing: border-box;
        }
        #sendBtn {
            width: 100%;
            padding: 10px;
            background: #4c4cff;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
        #sendBtn:hover {
            background: #6a6aff;
        }
        #sendBtn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>MAKECODE AI WEBPAGE</h1>
    <div id="container">
        <!-- Pixel Grid -->
        <div id="pixelGrid"></div>
        
        <!-- Right Panel -->
        <div id="rightPanel">
            <!-- Dynamic token setup keeps your key protected from GitHub scrapers -->
            <input id="hfTokenInput" type="password" placeholder="Paste your Hugging Face Access Token here (hf_...)">
            
            <div id="output">AI output will appear here…</div>
            <input id="userInput" placeholder="Describe your sprite (e.g., 'make it a robot')">
            <button id="sendBtn">Generate Sprite</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
